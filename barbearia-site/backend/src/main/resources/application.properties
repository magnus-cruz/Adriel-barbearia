spring.application.name=barbearia-backend

# Porta fixa da API local
server.port=8080

# Encoding UTF-8 para requests e responses
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
spring.mvc.charset=UTF-8

# Jackson JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Multipart para upload local
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Pasta local de upload relativa a raiz do projeto backend
upload.dir=uploads

# Pasta de dados JSON relativa ao diretorio de execucao (user.dir)
data.dir=data/

# Configuracoes existentes do projeto
app.upload-dir=uploads
app.admin.username=admin
app.admin.password=123456

# Logs de requisicao/resposta em nivel informativo
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=INFO
logging.level.com.barbearia=DEBUG

# Se houver Spring Security no classpath, desativa a auto configuracao padrao
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
