spring.application.name=barbearia-backend
server.port=8080

# Diretorios de persistencia e upload
app.data-dir=src/main/resources/data
app.upload-dir=uploads

# CORS para frontend local
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# Credenciais admin (trocar em producao)
app.admin.username=admin
app.admin.password=123456
