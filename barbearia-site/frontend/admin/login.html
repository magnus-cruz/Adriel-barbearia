<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="section">
    <div class="container" style="max-width:460px;">
      <article class="card">
        <h1>Painel Administrativo</h1>
        <p class="small">Acesso restrito</p>
        <form id="login-form" class="form">
          <label>Usuario
            <input id="usuario" required>
          </label>
          <label>Senha
            <input id="senha" type="password" required>
          </label>
          <button class="btn" type="submit"><i class="fa-solid fa-lock"></i> Entrar</button>
        </form>
      </article>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const usuario = document.getElementById("usuario").value;
        const senha = document.getElementById("senha").value;
        const data = await API.adminLogin(usuario, senha);
        localStorage.setItem("adminToken", data.token);
        window.location.href = "painel.html";
      } catch (error) {
        alert("Credenciais invalidas");
      }
    });
  </script>
</body>
</html>
