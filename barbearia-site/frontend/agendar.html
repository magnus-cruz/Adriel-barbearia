<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barber.CO | Agendamento</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <a class="brand" href="index.html">Barber<span>.</span>CO</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="agendar.html">Agendar</a>
        <a href="galeria.html">Galeria</a>
        <a href="cursos.html">Cursos</a>
        <a href="localizacao.html">Localizacao</a>
        <a href="admin/login.html"><i class="fa-solid fa-user-shield"></i> Admin</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Agende seu horario</h1>
      <form id="agendamento-form" class="form">
        <label>Nome
          <input id="nome" required>
        </label>
        <label>Telefone
          <input id="telefone" required>
        </label>
        <label>Servico desejado
          <select id="servico" required></select>
        </label>
        <p id="duracao-info" class="small"></p>
        <label>Data
          <input id="data" type="date" required>
        </label>
        <label>Horario disponivel
          <select id="horario" required></select>
        </label>
        <button class="btn" type="submit"><i class="fa-solid fa-scissors"></i> Confirmar Agendamento</button>
        <button class="btn secondary" id="btn-whatsapp" type="button"><i class="fa-brands fa-whatsapp"></i> Agendar pelo WhatsApp</button>
      </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/agendar.js"></script>
</body>
</html>
