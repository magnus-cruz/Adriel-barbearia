<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barber.CO | Cursos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <a class="brand" href="index.html">Barber<span>.</span>CO</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="agendar.html">Agendar</a>
        <a href="galeria.html">Galeria</a>
        <a class="active" href="cursos.html">Cursos</a>
        <a href="localizacao.html">Localizacao</a>
        <a href="admin/login.html"><i class="fa-solid fa-user-shield"></i> Admin</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Venda de Cursos</h1>
      <div id="cursos-grid" class="grid services"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/whatsapp.js"></script>
  <script>
    async function initCursos() {
      const cursos = await API.getCursos();
      document.getElementById("cursos-grid").innerHTML = cursos.map((c) => `
        <article class="card">
          <img src="${c.imagemUrl}" alt="${c.titulo}">
          <h3>${c.titulo}</h3>
          <p class="small">${c.descricao}</p>
          <p class="small"><strong>Carga horaria:</strong> ${c.cargaHoraria}</p>
          <p class="price">R$ ${c.preco.toFixed(2)}</p>
          <a class="btn" target="_blank" href="${c.linkCompra}"><i class="fa-solid fa-cart-shopping"></i> Comprar</a>
        </article>`).join("");
    }
    initCursos();
  </script>
</body>
</html>
