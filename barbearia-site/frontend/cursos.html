<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpha Barber | Cursos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <nav>
        <div class="logo-alpha-barber">
          <img src="/img/logo-alpha-barber.png"
               alt="Alpha Barber"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
          <div class="logo-texto" style="display:none">
            <span class="logo-alpha">ALPHA</span>
            <span class="logo-barber"><span class="logo-accent">B</span>ARBER</span>
          </div>
        </div>

        <ul class="nav-links" id="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="agendar.html">Agendar</a></li>
          <li><a href="galeria.html">Galeria</a></li>
          <li><a class="active" href="cursos.html">Cursos</a></li>
          <li><a href="localizacao.html">Localizacao</a></li>
          <li><a class="btn-admin-nav" href="admin/login.html">Admin</a></li>
        </ul>

        <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false" onclick="toggleMenu()">
          <span class="ham-line"></span>
          <span class="ham-line"></span>
          <span class="ham-line"></span>
        </button>
      </nav>
    </div>
  </header>
  <div class="nav-overlay" id="nav-overlay" onclick="fecharMenu()"></div>

  <main class="section">
    <div class="container">
      <h1>Venda de Cursos</h1>
      <div id="cursos-grid" class="grid services"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/whatsapp.js"></script>
  <script>
    async function initCursos() {
      const cursos = await API.getCursos();
      document.getElementById("cursos-grid").innerHTML = cursos.map((c) => `
        <article class="card">
          <img src="${c.imagemUrl}" alt="${c.titulo}">
          <h3>${c.titulo}</h3>
          <p class="small">${c.descricao}</p>
          <p class="small"><strong>Carga horaria:</strong> ${c.cargaHoraria}</p>
          <p class="price">R$ ${c.preco.toFixed(2)}</p>
          <a class="btn" target="_blank" href="${c.linkCompra}"><i class="fa-solid fa-cart-shopping"></i> Comprar</a>
        </article>`).join("");
    }
    initCursos();
  </script>
</body>
</html>
