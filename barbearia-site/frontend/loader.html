<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- ================================================
       Alpha Barber - loader.html
       Funcao: tela inicial de carregamento responsiva.
       ================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpha Barber - Carregando</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/loader.css">
</head>
<body>
  <main class="loader-wrap">
    <div class="loader-logo">
      <span class="logo-alpha">ALPHA</span>
      <span class="logo-barber"><span class="logo-accent">B</span>ARBER</span>
    </div>
    <p class="loader-text">Preparando sua experiencia</p>
    <div class="loader-track"><div id="loader-barra" class="loader-fill"></div></div>
    <span id="loader-pct" class="loader-pct">0%</span>
  </main>
  <script src="js/loader.js"></script>
</body>
</html>
